<svg xmlns="http://www.w3.org/2000/svg" width="640" height="800" viewBox="0 0 640 800" role="img" aria-label="Couple portrait placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff1f2"/>
      <stop offset="0.55" stop-color="#fffaf6"/>
      <stop offset="1" stop-color="#e6efe9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0" stop-color="#e6cf9a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#e6cf9a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c7a46b" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#c7a46b" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#c7a46b" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" />
    </filter>
  </defs>

  <rect width="640" height="800" fill="url(#bg)"/>
  <circle cx="320" cy="260" r="240" fill="url(#glow)" filter="url(#soft)"/>

  <!-- Decorative frame -->
  <rect x="46" y="46" width="548" height="708" rx="44" fill="none" stroke="#c7a46b" stroke-opacity="0.38" stroke-width="2"/>
  <rect x="72" y="72" width="496" height="656" rx="38" fill="none" stroke="#c7a46b" stroke-opacity="0.18" stroke-width="2"/>

  <!-- Stylized couple silhouettes (abstract) -->
  <g transform="translate(0,10)">
    <!-- Bride -->
    <path d="M235 520c0-70 44-130 104-130s104 60 104 130c0 62-46 110-104 110s-104-48-104-110z"
      fill="#1c1917" fill-opacity="0.10"/>
    <path d="M244 560c24 110 152 110 176 0"
      fill="none" stroke="#1c1917" stroke-opacity="0.20" stroke-width="10" stroke-linecap="round"/>
    <path d="M320 330c-56 0-98 42-98 96 0 54 42 96 98 96s98-42 98-96c0-54-42-96-98-96z"
      fill="#1c1917" fill-opacity="0.12"/>

    <!-- Groom -->
    <path d="M375 545c0-55 36-103 85-103s85 48 85 103c0 52-38 92-85 92s-85-40-85-92z"
      fill="#1c1917" fill-opacity="0.07"/>
    <path d="M460 380c-44 0-78 34-78 78s34 78 78 78 78-34 78-78-34-78-78-78z"
      fill="#1c1917" fill-opacity="0.09"/>
  </g>

  <!-- Bottom typography -->
  <g font-family="'Cormorant Garamond', serif" text-anchor="middle">
    <text x="320" y="682" font-size="44" fill="#1c1917" fill-opacity="0.82" font-weight="300">Sophia &amp; Oliver</text>
    <rect x="120" y="706" width="400" height="2" fill="url(#line)"/>
    <text x="320" y="740" font-size="18" fill="#9c7a45" fill-opacity="0.92" letter-spacing="6">WEDDING DAY</text>
  </g>
</svg>

